name: xue_hua_video_player
description: "Cross-platform Flutter video player plugin decoding local/network video with GStreamer (native C core + Dart FFI) and rendering into Flutter external Texture widgets."
version: 1.4.6
homepage: https://github.com/Matkurban/xue_hua_video_player
repository: https://github.com/Matkurban/xue_hua_video_player
issue_tracker: https://github.com/Matkurban/xue_hua_video_player/issues

environment:
  sdk: ^3.12.2
  flutter: '>=3.44.0'

dependencies:
  chat_context_menu: ^3.0.1
  flutter:
    sdk: flutter
  ffi: ^2.2.0
  plugin_platform_interface: ^2.0.2
  screen_brightness: ^2.1.11
  signals: ^7.1.0
  theme_extensions_builder_annotation: ^7.4.0

dev_dependencies:
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  build_runner: ^2.15.0
  theme_extensions_builder: ^7.4.0

flutter:
  plugin:
    platforms:
      android:
        package: xue_hua.video_player
        pluginClass: XueHuaVideoPlayerPlugin
        ffiPlugin: true
      ios:
        pluginClass: XueHuaVideoPlayerPlugin
        ffiPlugin: true
      macos:
        pluginClass: XueHuaVideoPlayerPlugin
        ffiPlugin: true
      windows:
        pluginClass: XueHuaVideoPlayerPluginCApi
      linux:
        pluginClass: XueHuaVideoPlayerPlugin
