name: xue_hua_video_player
description: "Cross-platform Flutter video player plugin decoding local/network video with GStreamer (via a Rust flutter_rust_bridge core) and rendering into a Flutter texture."
version: 1.0.6
homepage: https://github.com/Matkurban/xue_hua_video_player
repository: https://github.com/Matkurban/xue_hua_video_player
issue_tracker: https://github.com/Matkurban/xue_hua_video_player/issues

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  irondash_engine_context: ^0.5.5
  plugin_platform_interface: ^2.0.2
  signals: ^7.1.0
  liquid_glass_widgets: ^0.21.0
  theme_extensions_builder_annotation: ^7.4.0

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  build_runner: ^2.15.0
  theme_extensions_builder: ^7.4.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
