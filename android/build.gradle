// The Android Gradle Plugin builds the native code with the Android NDK.

group 'com.flutter_rust_bridge.xue_hua_video_player'
version '1.0.0'

def gstVer = System.getenv('GST_VER') ?: '1.28.4'

def defaultGstreamerAndroidCacheRoot = {
    def home = System.getProperty('user.home')
    def os = org.gradle.internal.os.OperatingSystem.current()
    if (os.isMacOsX()) {
        return "${home}/Library/Caches/xue_hua_video_player/gstreamer/android/${gstVer}"
    }
    if (os.isWindows()) {
        def localAppData = System.getenv('LOCALAPPDATA') ?: "${home}/AppData/Local"
        return "${localAppData}/xue_hua_video_player/gstreamer/android/${gstVer}"
    }
    def xdgCache = System.getenv('XDG_CACHE_HOME') ?: "${home}/.cache"
    return "${xdgCache}/xue_hua_video_player/gstreamer/android/${gstVer}"
}()

def gstRoot = System.getenv('GSTREAMER_ROOT_ANDROID') ?: defaultGstreamerAndroidCacheRoot
def gstJniOut = "${buildDir}/gstreamer/jniLibs"
def gstScriptsDir = "${projectDir}/scripts"

ext.gstreamerRootAndroid = gstRoot
ext.gstreamerVersion = gstVer

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        // The Android Gradle Plugin knows how to build native code with the NDK.
        classpath 'com.android.tools.build:gradle:7.3.0'
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.flutter_rust_bridge.xue_hua_video_player'
    }

    // Bumping the plugin compileSdkVersion requires all clients of this plugin
    // to bump the version in their app.
    compileSdkVersion 33

    // Use the NDK version
    // declared in /android/app/build.gradle file of the Flutter project.
    // Replace it with a version number if this plugin requires a specfic NDK version.
    // (e.g. ndkVersion "23.1.7779620")
    ndkVersion android.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        minSdkVersion 19
        consumerProguardFiles 'proguard-rules.pro'

        // All four Android ABIs are wired up: the umbrella GStreamer library is
        // built at compile time via ndk-build; libxue_hua_video_player.so is
        // built from Rust source at build time via cargokit. A consuming app
        // can narrow this set with its own `abiFilters` (e.g. arm64-v8a only).
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86', 'x86_64'
        }
    }

    // The umbrella GStreamer library (build/gstreamer/jniLibs/<abi>/
    // libgstreamer_android.so) plus libc++_shared.so are packaged into the
    // plugin AAR and merged into any consuming app. `useLegacyPackaging`
    // (mirrored by extractNativeLibs=true in the manifest) makes sure the
    // native libs are extracted to the filesystem for the dynamic loader.
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }

    testOptions {
        unitTests.returnDefaultValues = true
    }

    sourceSets {
        main {
            jniLibs.srcDir(gstJniOut)
        }
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

apply from: "../cargokit/gradle/plugin.gradle"
cargokit {
    manifestDir = "../rust"
    libname = "xue_hua_video_player"
}

// --- GStreamer (Android) dynamic build --------------------------------------
// On every Android build the plugin downloads the official GStreamer Android SDK
// (if missing) and runs ndk-build to produce libgstreamer_android.so per ABI.
// Override GSTREAMER_ROOT_ANDROID / GST_VER for offline or custom SDK paths.
// See android/scripts/ and the plugin README, "Android".

def flutterPlatformToAbi = [
    'android-arm'   : 'armeabi-v7a',
    'android-arm64' : 'arm64-v8a',
    'android-x86'   : 'x86',
    'android-x64'   : 'x86_64',
]

def resolveGstreamerAbis = {
    def abis = [] as LinkedHashSet
    try {
        def platforms = com.flutter.gradle.FlutterPluginUtils.getTargetPlatforms(project).collect()
        platforms.each { p ->
            def abi = flutterPlatformToAbi[p]
            if (abi != null) {
                abis.add(abi)
            }
        }
    } catch (Exception ignored) {
        // Not building inside a Flutter app context.
    }
    if (abis.isEmpty()) {
        abis.addAll(android.defaultConfig.ndk.abiFilters)
    }
    return abis as List
}

tasks.register('ensureGstreamerAndroid', Exec) {
    group = 'gstreamer'
    description = 'Download GStreamer Android SDK into the user cache if missing.'
    environment 'GST_VER', gstVer
    if (System.getenv('GSTREAMER_ROOT_ANDROID') != null) {
        environment 'GSTREAMER_ROOT_ANDROID', System.getenv('GSTREAMER_ROOT_ANDROID')
    }
    if (System.getenv('XUE_HUA_GSTREAMER_ROOT') != null) {
        environment 'XUE_HUA_GSTREAMER_ROOT', System.getenv('XUE_HUA_GSTREAMER_ROOT')
    }
    commandLine 'sh', "${gstScriptsDir}/ensure_gstreamer_android.sh"
}

tasks.register('buildGstreamerUmbrella', Exec) {
    group = 'gstreamer'
    description = 'ndk-build libgstreamer_android.so for the requested ABIs.'
    dependsOn ensureGstreamerAndroid

    inputs.files(
        file("${projectDir}/gstreamer_build/jni/Android.mk"),
        file("${projectDir}/gstreamer_build/jni/Application.mk"),
        file("${projectDir}/gstreamer_build/jni/dummy.c"),
    )

    outputs.dir(gstJniOut)

    outputs.upToDateWhen {
        def abis = resolveGstreamerAbis()
        abis.every { abi ->
            file("${gstJniOut}/${abi}/libgstreamer_android.so").exists() \
                && file("${gstJniOut}/${abi}/libc++_shared.so").exists()
        }
    }

    doFirst {
        if (android.ndkVersion == null) {
            throw new GradleException("Please set 'android.ndkVersion' in the app build.gradle.")
        }
        def abis = resolveGstreamerAbis()
        def ndkPath = "${android.sdkDirectory}/ndk/${android.ndkVersion}"
        environment 'GST_VER', gstVer
        environment 'GSTREAMER_ROOT_ANDROID', gstRoot
        commandLine(['sh', "${gstScriptsDir}/build_gstreamer_umbrella.sh", ndkPath, gstJniOut] + abis)
    }
}

def wireGstreamerDeps = { task ->
    if (task.name.startsWith('cargokitCargoBuild') ||
        (task.name.startsWith('merge') && (
            task.name.endsWith('NativeLibs') || task.name.endsWith('JniLibFolders')
        ))) {
        task.dependsOn buildGstreamerUmbrella
    }
}

project.gradle.afterProject { p ->
    if (p != project) {
        return
    }
    project.tasks.configureEach wireGstreamerDeps
}

project.tasks.whenTaskAdded wireGstreamerDeps

