name: xue_hua_video_player_example
description: "Demonstrates how to use the xue_hua_video_player plugin."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  xue_hua_video_player:
    path: ../
  cupertino_icons: ^1.0.8
  signals: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/sample.mp4
    - assets/sample2.mp4
