# Builds signed, precompiled Rust binaries for every supported target and
# uploads them to a GitHub Release tagged `precompiled_<crate-hash>`. Consumers
# of the plugin then download the matching artifact instead of compiling the
# Rust code themselves (see rust/cargokit.yaml and the README).
#
# Required repository secrets:
#   PRIVATE_KEY  - ed25519 private key from `dart run build_tool gen-key`
#                  (its public half lives in rust/cargokit.yaml).
#   GITHUB_TOKEN - provided automatically; needs `contents: write` (see below).
#
# NOTE: precompiled binaries only remove the Rust toolchain requirement. Each
# runner must still have the matching GStreamer SDK so cargo can link the
# `cdylib` crate-type. Because the crate builds both a cdylib and a staticlib,
# the two macOS architectures are built on arch-matched runners.
name: Precompile Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GST_VERSION: "1.28.4"
  REPO_SLUG: "Matkurban/xue_hua_video_player"
  ANDROID_NDK_VERSION: "27.0.12077973"
  ANDROID_MIN_SDK: "24"

permissions:
  contents: write

jobs:
  # macOS (Apple silicon): aarch64-apple-darwin + aarch64-apple-ios (device).
  macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1.7.2
      - name: Install GStreamer (Homebrew, arm64) for macOS target
        run: brew install pkg-config gstreamer
      - name: Install GStreamer iOS devel SDK
        run: |
          curl -fLO "https://gstreamer.freedesktop.org/data/pkg/ios/${GST_VERSION}/gstreamer-1.0-devel-${GST_VERSION}-ios-universal.pkg"
          installer -pkg "gstreamer-1.0-devel-${GST_VERSION}-ios-universal.pkg" -target CurrentUserHomeDirectory
      - name: build_tool deps
        working-directory: cargokit/build_tool
        run: dart pub get
      - name: Precompile aarch64-apple-darwin
        working-directory: cargokit/build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:$PKG_CONFIG_PATH"
          dart run build_tool precompile-binaries -v \
            --manifest-dir=../../rust \
            --repository="$REPO_SLUG" \
            --target aarch64-apple-darwin
      - name: Precompile aarch64-apple-ios
        working-directory: cargokit/build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          # Mirror ios/xue_hua_video_player.podspec: drive the gstreamer/glib
          # `-sys` crates through system-deps against the static
          # GStreamer.framework (no pkg-config on iOS).
          GST_ROOT="$HOME/Library/Developer/GStreamer/iPhone.sdk"
          export GSTREAMER_ROOT_IOS="$GST_ROOT"
          export PKG_CONFIG_ALLOW_CROSS=1
          for p in GLIB_2_0 GOBJECT_2_0 GIO_2_0 GSTREAMER_1_0 GSTREAMER_BASE_1_0 GSTREAMER_APP_1_0 GSTREAMER_VIDEO_1_0; do
            export SYSTEM_DEPS_${p}_NO_PKG_CONFIG=1
            export SYSTEM_DEPS_${p}_SEARCH_FRAMEWORK="$GST_ROOT"
            export SYSTEM_DEPS_${p}_LIB_FRAMEWORK=GStreamer
            export SYSTEM_DEPS_${p}_INCLUDE="$GST_ROOT/GStreamer.framework/Headers"
          done
          dart run build_tool precompile-binaries -v \
            --manifest-dir=../../rust \
            --repository="$REPO_SLUG" \
            --target aarch64-apple-ios

  # macOS (Intel): x86_64-apple-darwin.
  # macos-13 was retired Dec 2025; macos-15-intel is the last GitHub-hosted
  # x86_64 macOS runner (scheduled retirement Aug 2027).
  macos-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1.7.2
      - name: Install GStreamer (Homebrew, x86_64)
        run: brew install pkg-config gstreamer
      - name: build_tool deps
        working-directory: cargokit/build_tool
        run: dart pub get
      - name: Precompile x86_64-apple-darwin
        working-directory: cargokit/build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:$PKG_CONFIG_PATH"
          dart run build_tool precompile-binaries -v \
            --manifest-dir=../../rust \
            --repository="$REPO_SLUG" \
            --target x86_64-apple-darwin

  # Linux: x86_64-unknown-linux-gnu (system GStreamer).
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1.7.2
      - name: Install GStreamer dev packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-libav \
            libgtk-3-dev \
            pkg-config
      - name: build_tool deps
        working-directory: cargokit/build_tool
        run: dart pub get
      - name: Precompile x86_64-unknown-linux-gnu
        working-directory: cargokit/build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          dart run build_tool precompile-binaries -v \
            --manifest-dir=../../rust \
            --repository="$REPO_SLUG" \
            --target x86_64-unknown-linux-gnu

  # Android: all four ABIs. The Rust cdylib links against the umbrella
  # libgstreamer_android.so that the plugin already ships in jniLibs; we copy the
  # per-ABI umbrella .so into the matching SDK lib dir so the -sys crates can
  # resolve `-lgstreamer_android` (see
  # cargokit/build_tool/lib/src/android_environment.dart).
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: aarch64-linux-android
            abi: arm64-v8a
            sdk_arch: arm64
          - rust_target: armv7-linux-androideabi
            abi: armeabi-v7a
            sdk_arch: armv7
          - rust_target: i686-linux-android
            abi: x86
            sdk_arch: x86
          - rust_target: x86_64-linux-android
            abi: x86_64
            sdk_arch: x86_64
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1.7.2
      - name: Install Android NDK ${{ env.ANDROID_NDK_VERSION }}
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;${ANDROID_NDK_VERSION}"
      - name: Download + extract GStreamer Android SDK
        run: |
          curl -fLO "https://gstreamer.freedesktop.org/data/pkg/android/${GST_VERSION}/gstreamer-1.0-android-universal-${GST_VERSION}.tar.xz"
          GST_ROOT="$HOME/Library/Developer/GStreamer/android/${GST_VERSION}"
          mkdir -p "$GST_ROOT"
          tar -xf "gstreamer-1.0-android-universal-${GST_VERSION}.tar.xz" -C "$GST_ROOT"
          # The Rust link step resolves `-lgstreamer_android` from the SDK's
          # <arch>/lib; supply it from the umbrella .so shipped with the plugin
          # for this ABI.
          cp "android/src/main/jniLibs/${{ matrix.abi }}/libgstreamer_android.so" \
            "$GST_ROOT/${{ matrix.sdk_arch }}/lib/"
      - name: build_tool deps
        working-directory: cargokit/build_tool
        run: dart pub get
      - name: Precompile ${{ matrix.rust_target }}
        working-directory: cargokit/build_tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          export GSTREAMER_ROOT_ANDROID="$HOME/Library/Developer/GStreamer/android/${GST_VERSION}"
          dart run build_tool precompile-binaries -v \
            --manifest-dir=../../rust \
            --repository="$REPO_SLUG" \
            --target ${{ matrix.rust_target }} \
            --android-sdk-location="$ANDROID_SDK_ROOT" \
            --android-ndk-version="$ANDROID_NDK_VERSION" \
            --android-min-sdk-version="$ANDROID_MIN_SDK"

  # Windows: x86_64-pc-windows-msvc (GStreamer MSVC devel install).
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1.7.2
      - name: Install pkg-config
        run: choco install -y pkgconfiglite
      - name: Install GStreamer MSVC (Inno .exe)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ver = "${env:GST_VERSION}"
          # GStreamer 1.28+ dropped the .msi packages: Windows now ships a single
          # Inno Setup .exe per arch bundling runtime + development files.
          # Two flags are essential for CI (see cerbero's inno_setup.py):
          #   /TYPE=devel  - the installer's DefaultDirName is {autopf}\... and
          #                  its silent default may omit headers; "devel" pulls in
          #                  the development headers/.lib/.pc that pkg-config needs.
          #   /DIR=...      - override DefaultDirName ({autopf}\gstreamer\...,
          #                  i.e. C:\Program Files\...) so the tree lands at the
          #                  canonical C:\gstreamer\1.0\msvc_x86_64 the precompile
          #                  step (PKG_CONFIG_PATH) expects.
          $exe = "gstreamer-1.0-msvc-x86_64-$ver.exe"
          curl.exe -fLO "https://gstreamer.freedesktop.org/data/pkg/windows/$ver/msvc/$exe"
          $p = Start-Process -FilePath ".\$exe" `
            -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-","/NOICONS","/TYPE=devel","/DIR=C:\gstreamer\1.0\msvc_x86_64" `
            -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            throw "GStreamer installer failed with exit code $($p.ExitCode)"
          }
      - name: build_tool deps
        working-directory: cargokit/build_tool
        run: dart pub get
      - name: Precompile x86_64-pc-windows-msvc
        working-directory: cargokit/build_tool
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          $env:GSTREAMER_1_0_ROOT_MSVC_X86_64 = "C:\gstreamer\1.0\msvc_x86_64"
          $env:PKG_CONFIG_PATH = "$env:GSTREAMER_1_0_ROOT_MSVC_X86_64\lib\pkgconfig"
          dart run build_tool precompile-binaries -v `
            --manifest-dir=../../rust `
            --repository="$env:REPO_SLUG" `
            --target x86_64-pc-windows-msvc
