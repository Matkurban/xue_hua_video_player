# Vendored copy of irondash_texture 0.5.0 with patches:
# - macOS/iOS: IOSurface stride aligned to 256 bytes (Metal CVReturn -6684)
# - Android: createSurfaceProducer() with deferred ANativeWindow, lifecycle callback,
#   no silent fallback when createSurfaceProducer API exists
# - Upgraded dependencies: jni 0.22, objc2 0.6, irondash_run_loop 0.6, etc.
[package]
name = "irondash_texture"
version = "0.5.0"
edition = "2021"
description = "Rust Bindings for Flutter External Textures."
authors = ["Matej Knopp <matej.knopp@gmail.com>"]
repository = "https://github.com/irondash/irondash"
license = "MIT"
exclude = ["example/"]

[dependencies]
irondash_engine_context = { path = "../irondash_engine_context" }
irondash_run_loop = "0.6.0"
log = "0.4"

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.22.4"
ndk-sys = "0.6.0"
once_cell = "1.21.4"

[target.'cfg(target_os = "windows")'.dependencies]
cstr = "0.2.12"
once_cell = "1.21.4"

[target.'cfg(target_os = "linux")'.dependencies]
glib-sys = "0.22.8"
gobject-sys = "0.22.6"
cstr = "0.2.12"
once_cell = "1.21.4"

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
objc2 = "0.6.4"
core-foundation = "0.10.1"
once_cell = "1.21.4"
