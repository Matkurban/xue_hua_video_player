# Vendored copy of irondash_engine_context 0.5.0 with upgraded dependencies:
# - jni 0.22, objc2 0.6, core-foundation 0.10
[package]
name = "irondash_engine_context"
version = "0.5.0"
edition = "2021"
license = "MIT"
description = "Easy access to FlutterView, FlutterBinaryMessenger and FlutterTextureRegistry for FFI."
authors = ["Matej Knopp <matej.knopp@gmail.com>"]
repository = "https://github.com/irondash/irondash"

[dependencies]
once_cell = "1.21.4"

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.22.4"
android_logger = "0.11"
log = "0.4"

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
objc2 = "0.6.4"
core-foundation = "0.10.1"
